name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build with Buildozer
        uses: Digreatbrian/buildozer-action@v2
        with:
          workdir: .

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APK
          path: ./**/*.apk
